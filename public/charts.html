    <script>
        const API_KEY = "d6ka5m9r01qkhj766v70d6ka5m9r01qkhj766v7g";
        
        async function drawChart() {
        
        const url =
        `https://finnhub.io/api/v1/stock/candle?symbol=AAPL&resolution=D&from=1700000000&to=1705000000&token=${API_KEY}`;
        
        const res = await fetch(url);
        const data = await res.json();
        
        const prices = data.c;
        
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");
        
        const max = Math.max(...prices);
        const min = Math.min(...prices);
        
        const stepX = canvas.width / prices.length;
        
        ctx.beginPath();
        
        prices.forEach((price, i) => {
        
            const x = i * stepX;
        
            const y =
            canvas.height -
            ((price - min) / (max - min)) * canvas.height;
        
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        
        });
        
        ctx.strokeStyle = "blue";
        ctx.stroke();
        }
        
        drawChart();
    </script>
